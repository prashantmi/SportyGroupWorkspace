openapi: 3.1.0
info:
  title: Sports Betting Backend API
  version: 1.0.0
  description: >
    OpenAPI specification for the Sports Betting Backend assessment service.
    The API can book bets into H2 and publish sports event outcomes to Kafka
    to start the asynchronous bet-settlement flow.

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Bets
    description: Book new open bets into the in-memory H2 store
  - name: Event Outcomes
    description: Publish sports event outcomes for asynchronous settlement processing

paths:
  /api/bets:
    post:
      tags:
        - Bets
      operationId: bookBet
      summary: Book a new bet
      description: >
        Accepts a new bet payload, validates the required fields, persists the bet
        as `OPEN` in H2, and returns `201 Created` with the stored bet details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookBetRequest'
            examples:
              newBet:
                summary: Premium bet for a new event
                value:
                  userId: user-9
                  eventId: event-300
                  eventMarketId: market-3
                  eventWinnerId: winner-9
                  betAmount: 50.00
                  betType: PREMIUM
      responses:
        '201':
          description: Bet created and stored as open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookBetResponse'
              examples:
                created:
                  value:
                    betId: 1005
                    userId: user-9
                    eventId: event-300
                    eventMarketId: market-3
                    eventWinnerId: winner-9
                    betAmount: 50.00
                    betType: PREMIUM
                    status: OPEN
        '400':
          description: Request validation failed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                invalidBet:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: Validation failed for request body.
                    instance: /api/bets

  /api/event-outcomes:
    post:
      tags:
        - Event Outcomes
      operationId: publishEventOutcome
      summary: Publish a sports event outcome
      description: >
        Accepts a sports event outcome payload, validates the required fields,
        publishes the event to Kafka topic `event-outcomes`, and returns `202 Accepted`.
        Bet settlement continues asynchronously after the response is returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventOutcomeRequest'
            examples:
              eventOutcome:
                summary: Match winner outcome
                value:
                  eventId: event-100
                  eventName: Match Winner
                  eventWinnerId: winner-1
      responses:
        '202':
          description: Event outcome accepted and published to Kafka
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishEventOutcomeResponse'
              examples:
                accepted:
                  value:
                    eventId: event-100
                    status: PUBLISHED
                    topic: event-outcomes
        '400':
          description: Request validation failed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                blankFields:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: Validation failed for request body.
                    instance: /api/event-outcomes

components:
  schemas:
    BookBetRequest:
      type: object
      additionalProperties: false
      required:
        - userId
        - eventId
        - eventMarketId
        - eventWinnerId
        - betAmount
        - betType
      properties:
        userId:
          type: string
          minLength: 1
          description: Identifier of the user placing the bet
          example: user-9
        eventId:
          type: string
          minLength: 1
          description: Unique identifier of the sports event
          example: event-300
        eventMarketId:
          type: string
          minLength: 1
          description: Identifier of the event market being bet on
          example: market-3
        eventWinnerId:
          type: string
          minLength: 1
          description: Selected outcome identifier for the bet
          example: winner-9
        betAmount:
          type: number
          minimum: 0.01
          description: Stake amount for the bet
          example: 50.00
        betType:
          type: string
          description: Bet classification used by payout rules
          enum:
            - STANDARD
            - BOOSTED
            - PREMIUM
          example: PREMIUM

    BookBetResponse:
      type: object
      additionalProperties: false
      required:
        - betId
        - userId
        - eventId
        - eventMarketId
        - eventWinnerId
        - betAmount
        - betType
        - status
      properties:
        betId:
          type: integer
          format: int64
          description: Generated bet identifier
          example: 1005
        userId:
          type: string
          example: user-9
        eventId:
          type: string
          example: event-300
        eventMarketId:
          type: string
          example: market-3
        eventWinnerId:
          type: string
          example: winner-9
        betAmount:
          type: number
          example: 50.00
        betType:
          type: string
          enum:
            - STANDARD
            - BOOSTED
            - PREMIUM
          example: PREMIUM
        status:
          type: string
          enum:
            - OPEN
          example: OPEN

    EventOutcomeRequest:
      type: object
      additionalProperties: false
      required:
        - eventId
        - eventName
        - eventWinnerId
      properties:
        eventId:
          type: string
          minLength: 1
          description: Unique identifier of the sports event
          example: event-100
        eventName:
          type: string
          minLength: 1
          description: Human-readable event name or market label
          example: Match Winner
        eventWinnerId:
          type: string
          minLength: 1
          description: Identifier of the winning outcome for the event
          example: winner-1

    PublishEventOutcomeResponse:
      type: object
      additionalProperties: false
      required:
        - eventId
        - status
        - topic
      properties:
        eventId:
          type: string
          description: Event identifier received in the request
          example: event-100
        status:
          type: string
          description: API publication status
          enum:
            - PUBLISHED
          example: PUBLISHED
        topic:
          type: string
          description: Kafka topic where the message was published
          example: event-outcomes

    ProblemDetail:
      type: object
      description: RFC 9457 problem detail response
      properties:
        type:
          type: string
          format: uri-reference
          example: about:blank
        title:
          type: string
          example: Bad Request
        status:
          type: integer
          format: int32
          example: 400
        detail:
          type: string
          example: Validation failed for request body.
        instance:
          type: string
          format: uri-reference
          example: /api/event-outcomes
