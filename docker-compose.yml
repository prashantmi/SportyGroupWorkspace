services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sporty-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sporty-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    command:
      - bash
      - -c
      - |
        /etc/confluent/docker/run &
        kafka_pid=$!
        cub kafka-ready -b localhost:9092 1 120
        kafka-topics --bootstrap-server localhost:9092 \
          --create --if-not-exists \
          --topic event-outcomes \
          --partitions 1 \
          --replication-factor 1
        wait "$kafka_pid"

  rocketmq-nameserver:
    image: apache/rocketmq:5.3.1
    container_name: sporty-rocketmq-nameserver
    ports:
      - "9876:9876"
    command: sh /home/rocketmq/rocketmq-5.3.1/bin/mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: sporty-rocketmq-broker
    depends_on:
      - rocketmq-nameserver
    ports:
      - "10911:10911"
    environment:
      NAMESRV_ADDR: rocketmq-nameserver:9876
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf:ro
    command:
      - sh
      - -c
      - |
        sleep 5
        sh /home/rocketmq/rocketmq-5.3.1/bin/mqbroker \
          -n rocketmq-nameserver:9876 \
          -c /home/rocketmq/rocketmq-5.3.1/conf/broker.conf &
        broker_pid=$!
        sleep 10
        sh /home/rocketmq/rocketmq-5.3.1/bin/mqadmin updateTopic \
          -n rocketmq-nameserver:9876 \
          -c DefaultCluster \
          -t bet-settlements || true
        wait "$broker_pid"
